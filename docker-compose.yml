# =============================================================================
# AgentStationHub - portable stack.
#
# Usage (after 'az login' on the host):
#   docker compose up --build
#   open http://localhost:8080/hub
#
# Configure via a .env next to this file:
#   AZURE_OPENAI_ENDPOINT=https://<your>.openai.azure.com/
#   AZURE_OPENAI_DEPLOYMENT=gpt-5.4
#   AZURE_OPENAI_RUNNER_DEPLOYMENT=gpt-5.3-chat
#   AZURE_TENANT_ID=<optional - only when you want to pin a tenant>
#   AZURE_OPENAI_API_KEY=<optional - fallback when AAD is not in use>
# =============================================================================

services:
  agentichub:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentichub/app:latest
    container_name: agentichub-app
    # NOTE: no `ports:` mapping. The app is reachable only through the
    # `caddy` reverse proxy (which lives on the same docker network and
    # resolves `agentichub:8080` by service name). This is the security
    # boundary: the public Internet can hit 80/443 → Caddy → app, but
    # never the app directly. Bare-metal `dotnet run` on dev machines
    # still works because launchSettings.json publishes 5000/5001
    # locally, separate from this compose graph.
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT}"
      AzureOpenAI__Deployment: "${AZURE_OPENAI_DEPLOYMENT:-gpt-5.4}"
      AzureOpenAI__RunnerDeployment: "${AZURE_OPENAI_RUNNER_DEPLOYMENT:-gpt-5.3-chat}"
      # Per-agent-role deployments (typed-actions architecture). Each
      # deployment lives in the same Foundry account; defaults match
      # what we provisioned: ash-strategist (gpt-5.1), ash-doctor
      # (o4-mini reasoning), ash-verifier (gpt-4.1-mini). When unset,
      # the SandboxRunner falls back to RunnerDeployment.
      AzureOpenAI__StrategistDeployment: "${AZURE_OPENAI_DEPLOYMENT_STRATEGIST:-ash-strategist}"
      AzureOpenAI__DoctorDeployment:     "${AZURE_OPENAI_DEPLOYMENT_DOCTOR:-ash-doctor}"
      AzureOpenAI__VerifierDeployment:   "${AZURE_OPENAI_DEPLOYMENT_VERIFIER:-ash-verifier}"
      AzureOpenAI__TenantId: "${AZURE_TENANT_ID:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      # Foundry Hosted-Doctor migration. Set FOUNDRY_USE_FOUNDRY_DOCTOR=true
      # in your .env to route the 'remediate' stage to the hosted agent
      # (registered as ash-doctor-hosted on the Foundry project). Falls
      # back to the in-sandbox Doctor on any failure. DoctorAgentEndpoint
      # is the agent URL printed by 'azd deploy ash-doctor-hosted'; the
      # client suffixes /invocations automatically. DoctorInvokeUrl
      # overrides the suffix when set.
      Foundry__UseFoundryDoctor:    "${FOUNDRY_USE_FOUNDRY_DOCTOR:-false}"
      Foundry__DoctorAgentEndpoint: "${FOUNDRY_DOCTOR_AGENT_ENDPOINT:-}"
      Foundry__DoctorInvokeUrl:     "${FOUNDRY_DOCTOR_INVOKE_URL:-}"
      Foundry__DoctorApiKey:        "${FOUNDRY_DOCTOR_API_KEY:-}"
      # Service-Principal credentials picked up by Azure.Identity's
      # EnvironmentCredential (first link in DefaultAzureCredential's
      # chain). Required for the FoundryDoctorClient because the host's
      # `az login` token cache is DPAPI-protected on Windows and cannot
      # be made available to a Linux container. Same SP is reused for
      # every Azure call the orchestrator makes that targets ai.azure.com.
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:-}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID:-}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET:-}"
      # Single-account login. The app's /login page validates against
      # these two values. AUTH_PASSWORD is a plain string kept only in
      # .env on the VM (gitignored). When unset the app fails closed —
      # nobody can authenticate. To rotate, edit .env and
      # `docker compose up -d --force-recreate --no-deps agentichub`.
      Auth__Username: "${AUTH_USERNAME:-demo}"
      Auth__Password: "${AUTH_PASSWORD:-}"
    volumes:
      # DooD: the app spawns sibling sandbox containers on the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Path-matching bind mounts (same path host <-> container) so paths
      # generated by the app are valid when passed to 'docker run -v ...'
      # via the host daemon. A named volume would break this.
      - /var/agentichub-work:/var/agentichub-work
      - /var/agentichub-tools:/var/agentichub-tools
      # Host Azure login, mounted READ-ONLY at a stash path. The
      # entrypoint copies this to /root/.azure (writable) at startup.
      # Why not bind-mount directly to /root/.azure:ro: the in-container
      # 'az' CLI subprocess (invoked by Azure.Identity's AzureCliCredential)
      # REQUIRES write access to /root/.azure/az.sess. With a :ro mount
      # it fails with "[Errno 30] Read-only file system" and every
      # DefaultAzureCredential call cascades into a full chain failure,
      # breaking any Azure OpenAI call the app makes without an API key.
      # The stash + copy keeps your host login immutable AND gives the
      # container a working Azure CLI.
      - "${HOME:-${USERPROFILE}}/.azure:/host-azure-readonly:ro"
      # Agent catalog + memory insights persistence.
      - agentichub-state:/root/.local/share/AgentStationHub
      # Also mount the SANDBOX's Azure profile volume here at a stash
      # path. The entrypoint uses this to synchronise the host az login
      # (/host-azure-readonly) into the named volume mounted by every
      # sandbox container at /root/.azure. Without this sync the sandbox
      # volume can go stale (msal_token_cache.bin missing / expired)
      # while the host is freshly 'az login'-ed - the symptom is
      # 'az account show' returning nothing inside the sandbox and the
      # deploy pipeline dying on "No Azure subscription found".
      # Keeping the sync server-side avoids asking the user to run the
      # in-sandbox 'az login --use-device-code' every time their host
      # token rolls.
      - agentichub-azure-profile:/sandbox-azure-profile
    restart: unless-stopped
    hostname: agentichub

  # =========================================================================
  # Caddy v2 reverse proxy. Terminates TLS (Let's Encrypt, fully automatic),
  # gates the public surface behind HTTP basic auth, and forwards everything
  # to the `agentichub` service on the internal docker network. See the
  # top-level `Caddyfile` for the routing logic and the README's "Public
  # access & TLS" section for the full posture.
  # =========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: agentichub-caddy
    restart: unless-stopped
    depends_on:
      - agentichub
    ports:
      - "80:80"
      - "443:443"
      # QUIC / HTTP/3. Caddy advertises Alt-Svc only when this is open,
      # so leaving it disabled is safe (clients fall back to HTTP/2).
      - "443:443/udp"
    environment:
      # Pulled from the .env. Set BASIC_AUTH_HASH with:
      #   docker run --rm caddy:2-alpine caddy hash-password --plaintext '<pw>'
      PUBLIC_FQDN:       "${PUBLIC_FQDN}"
      BASIC_AUTH_USER:   "${BASIC_AUTH_USER:-demo}"
      BASIC_AUTH_HASH:   "${BASIC_AUTH_HASH}"
      CADDY_ACME_EMAIL:  "${CADDY_ACME_EMAIL:-admin@example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist the issued cert + ACME account key across recreates,
      # otherwise we'd hit Let's Encrypt rate limits on every redeploy.
      - caddy-data:/data
      - caddy-config:/config

volumes:
  agentichub-state:
    name: agentichub-state
  agentichub-azure-profile:
    name: agentichub-azure-profile
  caddy-data:
    name: agentichub-caddy-data
  caddy-config:
    name: agentichub-caddy-config